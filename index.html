<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0b1e3b; color: #e0f7ff; padding: 20px; }
  h1, h2 { color: #00cfff; text-align: center; }
  select { padding: 10px 15px; font-size: 16px; border-radius: 8px; border: none; background: #12325b; color: #e0f7ff; margin-bottom: 20px; cursor: pointer; }
  select:hover { background: #1457a8; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; box-shadow: 0 0 10px #00cfff66; }
  th, td { padding: 12px; text-align: left; }
  th { background-color: #12325b; color: #00cfff; }
  tr:nth-child(even) { background-color: #0f2a4c; }
  tr:hover { background-color: #1457a8; transition: 0.3s; cursor: default; }
  td { color: #e0f7ff; vertical-align: middle; }
  td img.logo { width: 24px !important; height: 24px !important; object-fit: contain; margin-right: 8px; vertical-align: middle; }
</style>
</head>
<body>

<h1>🎮 Ma Collection Gaming</h1>
<h2>Filtrer les jeux par console :</h2>

<div style="text-align: center;">
  <select id="consoleSelect" onchange="filtrerJeux()">
    <option value="all">Toutes les consoles</option>
    <option value="Nintendo Switch">Nintendo Switch</option>
    <option value="PS5">PlayStation 5</option>
    <option value="Xbox Series X">Xbox Series X</option>
  </select>
</div>

<table id="jeuxTable"></table>

<script>
let jeuxData = [];

// Charger les données depuis data/jeux.json
fetch('data/jeux.json')
  .then(response => response.json())
  .then(data => {
    jeuxData = data;

    // Tri alphabétique par nom
    jeuxData.sort((a,b) => a.nom.localeCompare(b.nom, 'fr', {sensitivity: 'base'}));

    afficherJeux(jeuxData, false);
  })
  .catch(err => console.error('Erreur:', err));

function afficherJeux(jeux, cacherConsole) {
  const table = document.getElementById('jeuxTable');
  table.innerHTML = '';

  // Entête
  const header = table.insertRow();
  const thNom = document.createElement('th'); thNom.textContent = "Nom du jeu"; header.appendChild(thNom);
  if (!cacherConsole) { const thConsole = document.createElement('th'); thConsole.textContent = "Console"; header.appendChild(thConsole); }
  const thStatut = document.createElement('th'); thStatut.textContent = "Statut"; header.appendChild(thStatut);

  // Lignes
  jeux.forEach(jeu => {
    const row = table.insertRow();

    // Nom + logo
    const nameCell = row.insertCell();
    if (jeu.logo) {
      const logo = document.createElement('img');
      logo.src = jeu.logo;
      logo.className = "logo";
      nameCell.appendChild(logo);
    }

    const span = document.createElement('span');
    span.textContent = jeu.nom;
    nameCell.appendChild(span);

    // Console (si visible)
    if (!cacherConsole) {
      const consoleCell = row.insertCell();
      consoleCell.textContent = jeu.console;
    }

    // Statut
    const statutCell = row.insertCell();
    statutCell.textContent = jeu.statut;
  });
}

function filtrerJeux() {
  const valeur = document.getElementById("consoleSelect").value;
  if (valeur === "all") {
    afficherJeux(jeuxData, false);
  } else {
    const filtered = jeuxData.filter(j => j.console === valeur);
    afficherJeux(filtered, true);
  }
}
</script>

</body>
</html>
