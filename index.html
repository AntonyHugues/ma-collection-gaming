<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0b1e3b;
    color: #e0f7ff;
    padding: 20px;
  }
  h1 { text-align:center; color:#00cfff; }
  
  /* Cartes constructeur */
  .card-container {
    text-align:center;
    margin-bottom:20px;
  }
  .card {
    display: inline-block;
    padding: 20px 30px;
    margin: 10px;
    background: #12325b;
    color: #00cfff;
    border-radius: 15px;
    cursor: pointer;
    font-size: 18px;
    transition: 0.3s;
    vertical-align: middle;
  }
  .card img {
    width: 40px;
    height: 40px;
    vertical-align: middle;
    margin-right: 8px;
  }
  .card:hover { background:#1457a8; transform:scale(1.05); }
  .card.active { background:#00cfff; color:#0b1e3b; transform:scale(1.08); }

  /* Tableau transformé en cartes */
  #jeuxTable {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
    margin-top:20px;
  }
  .jeu-card {
    background:#12325b;
    border-radius:15px;
    padding:15px;
    width:200px;
    text-align:center;
    box-shadow:0 0 10px #00cfff66;
    transition:0.3s;
  }
  .jeu-card:hover { background:#1457a8; transform:scale(1.05); }
  .jeu-card img { width:64px; height:64px; object-fit:contain; margin-bottom:10px; }
  .jeu-card h3 { margin:5px 0; color:#00cfff; font-size:16px; }
  .jeu-card p { margin:3px 0; font-size:14px; }
</style>
</head>
<body>

<h1>🎮 Ma Collection Gaming</h1>
<h2 style="text-align:center;">Choisir un constructeur :</h2>

<div class="card-container">
  <div class="card" id="card-nintendo" onclick="choisirConstructeur('nintendo')">
    <img src="images/logos/nintendo.png" alt="Nintendo Logo">Nintendo
  </div>
  <div class="card" id="card-sony" onclick="choisirConstructeur('sony')">
    <img src="images/logos/sony.png" alt="Sony Logo">PlayStation
  </div>
</div>

<div id="consoleContainer" style="text-align:center; margin-bottom:20px; display:none;">
  <select id="consoleSelect" onchange="filtrerJeux()"></select>
</div>

<div id="jeuxTable"></div>

<script>
let jeuxData = [];

// Charger JSON
fetch('data/jeux.json')
  .then(res => res.json())
  .then(data => {
    jeuxData = data;
    jeuxData.sort((a,b) => a.nom.localeCompare(b.nom,'fr',{sensitivity:'base'}));
    afficherJeux(jeuxData, false);
  })
  .catch(err=>console.error('Erreur:',err));

// Choix constructeur
function choisirConstructeur(type){
  const select = document.getElementById("consoleSelect");
  const container = document.getElementById("consoleContainer");

  // reset carte active
  document.getElementById("card-nintendo").classList.remove("active");
  document.getElementById("card-sony").classList.remove("active");
  document.getElementById("card-"+type).classList.add("active");

  select.innerHTML = '';
  let consoles = [];
  if(type==='nintendo') consoles=["NES","Super Nintendo","N64","Game Cube","WII","WII U","Nintendo Switch"];
  if(type==='sony') consoles=["PS1","PS2","PS3","PS4","PS5"];

  // remplir select
  consoles.forEach(c=>{
    const option = document.createElement("option");
    option.value=c;
    option.textContent=c;
    select.appendChild(option);
  });

  container.style.display = "block";

  // afficher tous les jeux du constructeur
  const filtered = jeuxData.filter(j=>consoles.includes(j.console));
  afficherJeux(filtered,true);
}

// Affichage cartes de jeux
function afficherJeux(jeux,cacherConsole){
  const table = document.getElementById('jeuxTable');
  table.innerHTML='';

  jeux.forEach(jeu=>{
    const card = document.createElement('div');
    card.className='jeu-card';

    if(jeu.logo){
      const img = document.createElement('img');
      img.src=jeu.logo;
      card.appendChild(img);
    }

    const title = document.createElement('h3');
    title.textContent=jeu.nom;
    card.appendChild(title);

    if(!cacherConsole){
      const cons = document.createElement('p');
      cons.textContent=jeu.console;
      card.appendChild(cons);
    }

    const status = document.createElement('p');
    status.textContent=jeu.statut;
    card.appendChild(status);

    table.appendChild(card);
  });
}

// Filtrer par console
function filtrerJeux(){
  const valeur = document.getElementById("consoleSelect").value;
  if(valeur==="all") afficherJeux(jeuxData,false);
  else{
    const filtered = jeuxData.filter(j=>j.console===valeur);
    afficherJeux(filtered,true);
  }
}
</script>
</body>
</html>
