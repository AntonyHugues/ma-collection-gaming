<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0b1e3b;
  color: #e0f7ff;
  padding: 20px;
}

h1, h2 {
  color: #00cfff;
  text-align: center;
}

/* Cartes constructeur */
.card {
  display: inline-block;
  padding: 20px;
  margin: 10px;
  background: #12325b;
  color: #00cfff;
  border-radius: 15px;
  cursor: pointer;
  font-size: 18px;
  transition: 0.3s;
}

.card:hover {
  background: #1457a8;
  transform: scale(1.05);
}

.card.active {
  background: #00cfff;
  color: #0b1e3b;
  transform: scale(1.08);
}

/* Select */
select {
  padding: 10px 15px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #12325b;
  color: #e0f7ff;
  margin-bottom: 20px;
  cursor: pointer;
}

/* Tableau */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
  box-shadow: 0 0 10px #00cfff66;
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  background-color: #12325b;
  color: #00cfff;
}

tr:nth-child(even) {
  background-color: #0f2a4c;
}

tr:hover {
  background-color: #1457a8;
  transition: 0.3s;
}

td {
  color: #e0f7ff;
  vertical-align: middle;
}

td img.logo {
  width: 24px !important;
  height: 24px !important;
  object-fit: contain;
  margin-right: 8px;
  vertical-align: middle;
}
</style>
</head>

<body>

<h1>🎮 Ma Collection Gaming</h1>

<h2>Choisir un constructeur :</h2>

<div style="text-align:center;">
  <div class="card" id="card-nintendo" onclick="choisirConstructeur('nintendo')">🎮 Nintendo</div>
  <div class="card" id="card-sony" onclick="choisirConstructeur('sony')">🎮 PlayStation</div>
</div>

<div id="consoleContainer" style="text-align:center; margin-top:20px; display:none;">
  <h2>Choisir une console :</h2>
  <select id="consoleSelect" onchange="filtrerJeux()"></select>
</div>

<table id="jeuxTable"></table>

<script>
let jeuxData = [];

// Charger JSON
fetch('data/jeux.json')
  .then(response => response.json())
  .then(data => {
    jeuxData = data;

    // Tri alphabétique
    jeuxData.sort((a,b) => a.nom.localeCompare(b.nom, 'fr', {sensitivity:'base'}));

    afficherJeux(jeuxData, false);
  })
  .catch(err => console.error('Erreur:', err));

// Choisir constructeur
function choisirConstructeur(type) {
  const select = document.getElementById("consoleSelect");
  const container = document.getElementById("consoleContainer");

  // reset bouton actif
  document.getElementById("card-nintendo").classList.remove("active");
  document.getElementById("card-sony").classList.remove("active");
  document.getElementById("card-" + type).classList.add("active");

  select.innerHTML = '';

  let consoles = [];

  if (type === "nintendo") {
    consoles = ["NES","Super Nintendo","N64","Game Cube","WII","WII U","Nintendo Switch"];
  }

  if (type === "sony") {
    consoles = ["PS1","PS2","PS3","PS4","PS5"];
  }

  // remplir menu
  consoles.forEach(c => {
    const option = document.createElement("option");
    option.value = c;
    option.textContent = c;
    select.appendChild(option);
  });

  container.style.display = "block";

  // afficher tous les jeux du constructeur
  const filtered = jeuxData.filter(j => consoles.includes(j.console));
  afficherJeux(filtered, false);
}

// Affichage tableau
function afficherJeux(jeux, cacherConsole) {
  const table = document.getElementById('jeuxTable');
  table.innerHTML = '';

  // Entête
  const header = table.insertRow();

  const thNom = document.createElement('th');
  thNom.textContent = "Nom du jeu";
  header.appendChild(thNom);

  if (!cacherConsole) {
    const thConsole = document.createElement('th');
    thConsole.textContent = "Console";
    header.appendChild(thConsole);
  }

  const thStatut = document.createElement('th');
  thStatut.textContent = "Statut";
  header.appendChild(thStatut);

  // Lignes
  jeux.forEach(jeu => {
    const row = table.insertRow();

    const nameCell = row.insertCell();

    if (jeu.logo) {
      const logo = document.createElement('img');
      logo.src = jeu.logo;
      logo.className = "logo";
      nameCell.appendChild(logo);
    }

    const span = document.createElement('span');
    span.textContent = jeu.nom;
    nameCell.appendChild(span);

    if (!cacherConsole) {
      const consoleCell = row.insertCell();
      consoleCell.textContent = jeu.console;
    }

    const statutCell = row.insertCell();
    statutCell.textContent = jeu.statut;

    // couleur statut
    if (jeu.statut === "Dans la collection") {
      statutCell.style.color = "#4cff88";
    } else if (jeu.statut === "À acheter") {
      statutCell.style.color = "#ff5c5c";
    }

    statutCell.style.fontWeight = "bold";
  });
}

// Filtrer console
function filtrerJeux() {
  const valeur = document.getElementById("consoleSelect").value;

  const filtered = jeuxData.filter(j => j.console === valeur);
  afficherJeux(filtered, true);
}
</script>

</body>
</html>
