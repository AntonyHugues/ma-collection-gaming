<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>

<style>
body { font-family: 'Segoe UI', sans-serif; background:#0b1e3b; color:#e0f7ff; padding:20px; }

h1 { color:#00cfff; text-align:center; }

.card {
  display:inline-block;
  padding:20px;
  margin:10px;
  background:#12325b;
  color:#00cfff;
  border-radius:15px;
  cursor:pointer;
}
.card:hover { background:#1457a8; transform:scale(1.05); }
.card.active { background:#00cfff; color:#0b1e3b; }

button {
  margin:4px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#12325b;
  color:#00cfff;
  cursor:pointer;
}
button.active { background:#00cfff; color:#0b1e3b; }

input, select {
  padding:8px;
  border-radius:8px;
  border:none;
  background:#12325b;
  color:#e0f7ff;
}

#topBar {
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  margin-top:15px;
}

table { width:100%; margin-top:20px; border-collapse:collapse; }
th,td { padding:10px; }
th { background:#12325b; }

.kanban { display:flex; gap:10px; margin-top:20px; }
.column { flex:1; background:#0f2a4c; padding:10px; border-radius:10px; }

.game-card {
  background:#12325b;
  margin:5px 0;
  padding:8px;
  border-radius:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<h1>🎮 Ma Collection Gaming</h1>

<!-- CONSTRUCTEURS -->
<div style="text-align:center;">
  <div class="card" id="card-nintendo" onclick="choisirConstructeur('nintendo')">Nintendo</div>
  <div class="card" id="card-sony" onclick="choisirConstructeur('sony')">PlayStation</div>
</div>

<!-- TOP BAR -->
<div id="topBar">

  <div>
    <button onclick="setView('table')" class="active">📋 Table</button>
    <button onclick="setView('kanban')">📊 Kanban</button>
  </div>

  <div>
    <button onclick="setStatus('all')" class="active">Tous</button>
    <button onclick="setStatus('Collection')">🎮 Collection</button>
    <button onclick="setStatus('A_acheter')">🛒 À acheter</button>
    <button onclick="setStatus('Achat_en_cours')">⏳ En cours</button>
  </div>

  <div>
    <input id="search" placeholder="🔍 Recherche..." oninput="applyFilters()">
  </div>

  <div>
    <select id="consoleSelect" onchange="applyFilters()">
      <option value="all">Toutes consoles</option>
    </select>
  </div>

</div>

<!-- TABLE -->
<table id="tableView"></table>

<!-- KANBAN -->
<div class="kanban" id="kanbanView" style="display:none;">
  <div class="column" id="col-buy"><h3>🛒 À acheter</h3></div>
  <div class="column" id="col-progress"><h3>⏳ En cours</h3></div>
  <div class="column" id="col-collection"><h3>🎮 Collection</h3></div>
</div>

<script>

let allJeux = [];
let jeuxConstructeur = [];

let selectedConsole = "all";
let selectedStatus = "all";
let selectedView = "table";

/* ---------------- LOAD DATA ---------------- */
fetch('data/index.json')
.then(r => r.json())
.then(files => Promise.all(files.map(f => fetch('data/'+f).then(r=>r.json()))))
.then(res => {
  allJeux = res.flat();
  jeuxConstructeur = [...allJeux];
  initConsoles();
  applyFilters();
});

/* ---------------- CONSTRUCTEUR ---------------- */
function choisirConstructeur(type){

  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-'+type).classList.add('active');

  fetch(`data/${type}.json`)
  .then(r => r.json())
  .then(files => Promise.all(files.map(f => fetch('data/'+f).then(r=>r.json()))))
  .then(res => {
    jeuxConstructeur = res.flat();
    initConsoles();
    applyFilters();
  });
}

/* ---------------- CONSOLES DYNAMIQUES ---------------- */
function choisirConstructeur(type){

  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-'+type).classList.add('active');

  fetch(`data/${type}.json`)
    .then(r => r.json())
    .then(files => {

      return Promise.all(
        files.map(f =>
          fetch('data/' + f)
            .then(r => r.json())
            .catch(() => [])
        )
      );

    })
    .then(results => {

      // 🔥 IMPORTANT : flatten comme avant
      jeuxConstructeur = results.flat();

      initConsoles();
      applyFilters();
    });
}

/* ---------------- FILTRES ---------------- */
function setStatus(s){
  selectedStatus = s;
  applyFilters();
}

function setView(v){
  selectedView = v;
  applyFilters();
}

function applyFilters(){

  const search = document.getElementById("search").value.toLowerCase();
  const consoleValue = document.getElementById("consoleSelect").value;

  let data = [...jeuxConstructeur];

  if(consoleValue !== "all") data = data.filter(j => j.console === consoleValue);
  if(selectedStatus !== "all") data = data.filter(j => j.statut === selectedStatus);
  if(search) data = data.filter(j => j.nom.toLowerCase().includes(search));

  render(data);
}

/* ---------------- RENDER ---------------- */
function render(data){

  if(selectedView === "table"){
    document.getElementById("tableView").style.display = "table";
    document.getElementById("kanbanView").style.display = "none";

    const table = document.getElementById("tableView");
    table.innerHTML = `
      <tr><th>Nom</th><th>Console</th><th>Statut</th></tr>
    `;

    data.forEach(j => {
      table.innerHTML += `
        <tr>
          <td>${j.nom}</td>
          <td>${j.console}</td>
          <td>${j.statut}</td>
        </tr>
      `;
    });
  }

  else {
    document.getElementById("tableView").style.display = "none";
    document.getElementById("kanbanView").style.display = "flex";

    document.getElementById("col-buy").innerHTML = "<h3>🛒 À acheter</h3>";
    document.getElementById("col-progress").innerHTML = "<h3>⏳ En cours</h3>";
    document.getElementById("col-collection").innerHTML = "<h3>🎮 Collection</h3>";

    data.forEach(j => {
      const div = document.createElement("div");
      div.className = "game-card";
      div.innerHTML = `<span>${j.nom}</span><span>${j.console}</span>`;

      if(j.statut === "A_acheter") document.getElementById("col-buy").appendChild(div);
      else if(j.statut === "Achat_en_cours") document.getElementById("col-progress").appendChild(div);
      else document.getElementById("col-collection").appendChild(div);
    });
  }
}

</script>

</body>
</html>
