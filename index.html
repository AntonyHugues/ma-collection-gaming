<!DOCTYPE html>
<html>
<head>
  <title>Ma Collection Gaming</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #00ff88;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #00cc6a;
    }

    .delete {
      background: red;
      color: white;
      margin-left: 10px;
    }

    li {
      margin: 10px;
      list-style: none;
    }
  </style>
</head>

<body>

<h1>🎮 Ma Collection</h1>

<input type="text" id="jeuInput" placeholder="Nom du jeu">
<br><br>
<button onclick="ajouterJeu()">➕ Ajouter le jeu</button>

<ul id="listeJeux"></ul>

<script>
function ajouterJeu() {
  let input = document.getElementById("jeuInput");
  let nom = input.value;

  if (nom === "") {
    alert("Entre un nom de jeu !");
    return;
  }

  let li = document.createElement("li");
  li.textContent = nom;

  let btn = document.createElement("button");
  btn.textContent = "❌";
  btn.className = "delete";

  btn.onclick = function() {
    li.remove();
  };

  li.appendChild(btn);
  document.getElementById("listeJeux").appendChild(li);

  input.value = "";
}
</script>

</body>
</html>
