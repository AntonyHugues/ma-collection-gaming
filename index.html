<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0b1e3b;
    color: #e0f7ff;
    padding: 20px;
  }
  h1, h2 { color: #00cfff; text-align: center; }
  select {
    padding: 10px 15px; font-size: 16px; border-radius: 8px; border: none;
    background: #12325b; color: #e0f7ff; margin-bottom: 20px; cursor: pointer;
  }
  select:hover { background: #1457a8; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; box-shadow: 0 0 10px #00cfff66; }
  th, td { padding: 12px; text-align: left; }
  th { background-color: #12325b; color: #00cfff; }
  tr:nth-child(even) { background-color: #0f2a4c; }
  tr:hover { background-color: #1457a8; transition: 0.3s; cursor: default; }
  td { color: #e0f7ff; }
</style>
</head>
<body>

<h1>🎮 Ma Collection Gaming</h1>
<h2>Filtrer les jeux par console :</h2>

<div style="text-align: center;">
  <select id="consoleSelect" onchange="filtrerJeux()">
    <option value="all">Toutes les consoles</option>
    <option value="Nintendo Switch">Nintendo Switch</option>
    <option value="PS5">PlayStation 5</option>
    <option value="Xbox Series X">Xbox Series X</option>
  </select>
</div>

<table id="jeuxTable">
  <tr>
    <th>Nom du jeu</th>
    <th>Console</th>
    <th>Statut</th>
  </tr>
</table>

<script>
// Charger les données depuis jeux.json
let jeuxData = [];

fetch('jeux.json')
  .then(response => response.json())
  .then(data => {
    jeuxData = data;
    afficherJeux(jeuxData);
  })
  .catch(err => console.error('Erreur:', err));

// Affiche les jeux dans le tableau
function afficherJeux(jeux) {
  const table = document.getElementById('jeuxTable');

  // Supprime toutes les lignes sauf l'entête
  table.innerHTML = `
    <tr>
      <th>Nom du jeu</th>
      <th>Console</th>
      <th>Statut</th>
    </tr>
  `;

  jeux.forEach(jeu => {
    const row = table.insertRow();
    row.insertCell(0).textContent = jeu.nom;
    row.insertCell(1).textContent = jeu.console;
    row.insertCell(2).textContent = jeu.statut;
  });
}

// Filtrer les jeux par console
function filtrerJeux() {
  const valeur = document.getElementById("consoleSelect").value;
  if (valeur === "all") {
    afficherJeux(jeuxData);
  } else {
    afficherJeux(jeuxData.filter(j => j.console === valeur));
  }
}
</script>

</body>
</html>
