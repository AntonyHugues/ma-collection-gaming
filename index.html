<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #0b1e3b; color: #e0f7ff; padding: 20px; }
h1 { color:#00cfff; text-align:center; margin-bottom:10px; }

/* Cards constructeur */
.card { display:inline-block; padding:20px; margin:10px; background:#12325b; color:#00cfff; border-radius:15px; cursor:pointer; transition:0.3s; }
.card:hover { background:#1457a8; transform:scale(1.05); }
.card.active { background:#00cfff; color:#0b1e3b; }

select,input { padding:8px 12px; border-radius:8px; border:none; background:#12325b; color:#e0f7ff; }
input:focus { outline:none; box-shadow:0 0 8px #00cfff; }

button { margin:0 5px; padding:6px 12px; background:#12325b; color:#00cfff; border:none; border-radius:8px; cursor:pointer; }
button:hover { background:#1457a8; }
button.active { background:#00cfff; color:#0b1e3b; }

/* Kanban */
.kanban {
  display:flex;
  gap:15px;
  margin-top:20px;
  align-items:flex-start;
}
.column {
  flex:1;
  background:#0f2a4c;
  border-radius:15px;
  padding:10px;
  min-height:300px;
  box-shadow:0 0 10px #00cfff33;
}
.column h2 {
  text-align:center;
  color:#00cfff;
}

.game-card {
  background:#12325b;
  margin:10px 0;
  padding:10px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Badge statut */
.badge {
  padding:4px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}
.badge.collection { background:#00cfff; color:#0b1e3b; }
.badge.a_acheter { background:#ffb020; color:#0b1e3b; }
.badge.en_cours { background:#7c5cff; color:white; }

#statusSearchContainer { display:flex; justify-content:space-between; align-items:center; margin-top:15px; }

</style>
</head>
<body>

<h1>🎮 Ma Collection Gaming (Kanban)</h1>

<div style="text-align:center;">
  <div class="card" id="card-nintendo" onclick="choisirConstructeur('nintendo')">Nintendo</div>
  <div class="card" id="card-sony" onclick="choisirConstructeur('sony')">PlayStation</div>
</div>

<div id="statusSearchContainer">
  <div>
    <button onclick="setView('all')" class="active">Tous</button>
    <button onclick="setView('kanban')">📊 Kanban</button>
  </div>
  <input id="searchInput" placeholder="🔍 Rechercher..." oninput="render()">
</div>

<!-- LISTE (fallback) -->
<table id="tableView" style="width:100%; margin-top:20px;"></table>

<!-- KANBAN -->
<div class="kanban" id="kanbanView" style="display:none;">
  <div class="column" id="toBuy">
    <h2>🛒 À acheter</h2>
  </div>
  <div class="column" id="inProgress">
    <h2>⏳ En cours</h2>
  </div>
  <div class="column" id="collection">
    <h2>🎮 Collection</h2>
  </div>
</div>

<script>
let allJeux = [];
let viewMode = 'all';

fetch('data/index.json')
  .then(r => r.json())
  .then(files => Promise.all(files.map(f => fetch('data/' + f).then(r => r.json()))))
  .then(results => {
    allJeux = results.flat();
    render();
  });

function setView(mode){
  viewMode = mode;
  render();
}

function render(){
  const search = document.getElementById('searchInput').value.toLowerCase();
  let data = allJeux.filter(j => j.nom.toLowerCase().includes(search));

  if(viewMode === 'kanban') renderKanban(data);
  else renderTable(data);
}

function renderTable(data){
  document.getElementById('kanbanView').style.display='none';
  document.getElementById('tableView').style.display='table';

  const table = document.getElementById('tableView');
  table.innerHTML='';

  const header = table.insertRow();
  header.innerHTML = '<th>Nom</th><th>Console</th><th>Statut</th>';

  data.forEach(j => {
    const row = table.insertRow();
    row.innerHTML = `
      <td>${j.nom}</td>
      <td>${j.console}</td>
      <td><span class="badge ${getClass(j.statut)}">${getIcon(j.statut)} ${format(j.statut)}</span></td>
    `;
  });
}

function renderKanban(data){
  document.getElementById('kanbanView').style.display='flex';
  document.getElementById('tableView').style.display='none';

  document.getElementById('toBuy').innerHTML = '<h2>🛒 À acheter</h2>';
  document.getElementById('inProgress').innerHTML = '<h2>⏳ En cours</h2>';
  document.getElementById('collection').innerHTML = '<h2>🎮 Collection</h2>';

  data.forEach(j => {
    const div = document.createElement('div');
    div.className='game-card';
    div.innerHTML = `<span>${j.nom}</span><span class="badge ${getClass(j.statut)}">${getIcon(j.statut)}</span>`;

    if(j.statut === 'A_acheter') document.getElementById('toBuy').appendChild(div);
    else if(j.statut === 'Achat_en_cours') document.getElementById('inProgress').appendChild(div);
    else document.getElementById('collection').appendChild(div);
  });
}

function getIcon(s){
  if(s==='Collection') return '🎮';
  if(s==='A_acheter') return '🛒';
  if(s==='Achat_en_cours') return '⏳';
  return '';
}

function getClass(s){
  if(s==='Collection') return 'collection';
  if(s==='A_acheter') return 'a_acheter';
  if(s==='Achat_en_cours') return 'en_cours';
  return '';
}

function format(s){
  if(s==='A_acheter') return 'À acheter';
  if(s==='Achat_en_cours') return 'En cours';
  return s;
}
</script>

</body>
</html>
