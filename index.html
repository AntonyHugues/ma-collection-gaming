<h1>🎮 Ma Collection</h1>

<ul id="listeJeux"></ul>

<script>
  // Charger la liste de jeux depuis le fichier JSON
  fetch('data/jeux.json')  // adapte le chemin si nécessaire
    .then(response => response.json())
    .then(jeux => {
      const liste = document.getElementById('listeJeux');
      jeux.forEach(jeu => {
        let li = document.createElement('li');
        li.textContent = jeu;
        liste.appendChild(li);
      });
    })
    .catch(err => console.error("Erreur lors du chargement des jeux :", err));
</script>

</body>
</html>
