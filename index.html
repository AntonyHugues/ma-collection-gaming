<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Ma Collection Gaming</title>

<style>
body { font-family: 'Segoe UI', sans-serif; background:#0b1e3b; color:#e0f7ff; padding:20px; }

h1 { text-align:center; color:#00cfff; }

.card {
  display:inline-block;
  padding:15px;
  margin:10px;
  background:#12325b;
  color:#00cfff;
  border-radius:12px;
  cursor:pointer;
}
.card.active { background:#00cfff; color:#0b1e3b; }

button {
  margin:3px;
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#12325b;
  color:#00cfff;
  cursor:pointer;
}
button.active { background:#00cfff; color:#0b1e3b; }

input, select {
  padding:6px;
  border-radius:8px;
  border:none;
  background:#12325b;
  color:#e0f7ff;
}

#topBar {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:space-between;
  margin-top:15px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}
th, td {
  padding:10px;
}
th { background:#12325b; }

.kanban {
  display:flex;
  gap:10px;
  margin-top:20px;
}
.column {
  flex:1;
  background:#0f2a4c;
  padding:10px;
  border-radius:10px;
}
.game {
  background:#12325b;
  padding:6px;
  margin:5px 0;
  border-radius:6px;
}
</style>
</head>

<body>

<h1>🎮 Ma Collection Gaming</h1>

<!-- CONSTRUCTEURS -->
<div style="text-align:center;">
  <div class="card" id="card-nintendo" onclick="choisirConstructeur('nintendo')">Nintendo</div>
  <div class="card" id="card-sony" onclick="choisirConstructeur('sony')">PlayStation</div>
</div>

<!-- FILTRES -->
<div id="topBar">

  <div>
    <button onclick="setStatus('all')" class="active">Tous</button>
    <button onclick="setStatus('Collection')">🎮 Collection</button>
    <button onclick="setStatus('A_acheter')">🛒 À acheter</button>
    <button onclick="setStatus('Achat_en_cours')">⏳ En cours</button>
  </div>

  <div>
    <input id="search" placeholder="🔍 recherche..." oninput="applyFilters()">
  </div>

  <div>
    <select id="consoleSelect" onchange="applyFilters()">
      <option value="all">Toutes consoles</option>
    </select>
  </div>

</div>

<!-- TABLE -->
<table id="table"></table>

<!-- KANBAN -->
<div class="kanban" id="kanban" style="display:none;">
  <div class="column" id="buy"><h3>🛒 À acheter</h3></div>
  <div class="column" id="progress"><h3>⏳ En cours</h3></div>
  <div class="column" id="collection"><h3>🎮 Collection</h3></div>
</div>

<script>

let allJeux = [];
let jeuxConstructeur = [];

let selectedStatus = "all";
let selectedView = "table";

/* ---------------- LOAD ALL ---------------- */
fetch('data/index.json')
.then(r => r.json())
.then(files => Promise.all(files.map(f =>
  fetch('data/' + f).then(r => r.json())
)))
.then(res => {
  allJeux = res.flat();
  jeuxConstructeur = [...allJeux];
  initConsoles();
  applyFilters();
});

/* ---------------- CONSTRUCTEUR (FIX IMPORTANT) ---------------- */
function choisirConstructeur(type){

  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-' + type).classList.add('active');

  fetch(`data/${type}.json`)
    .then(r => r.json())
    .then(files => {

      return Promise.all(
        files.map(f =>
          fetch('data/' + f)
            .then(r => r.json())
            .catch(() => [])
        )
      );

    })
    .then(results => {

      jeuxConstructeur = results.flat();

      initConsoles();
      applyFilters();
    });
}

/* ---------------- CONSOLES ---------------- */
function initConsoles(){

  const select = document.getElementById("consoleSelect");
  select.innerHTML = `<option value="all">Toutes consoles</option>`;

  const consoles = [...new Set(jeuxConstructeur.map(j => j.console))];

  consoles.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    select.appendChild(opt);
  });
}

/* ---------------- STATUS ---------------- */
function setStatus(s){
  selectedStatus = s;
  applyFilters();
}

/* ---------------- FILTER ENGINE ---------------- */
function applyFilters(){

  const search = document.getElementById("search").value.toLowerCase();
  const consoleVal = document.getElementById("consoleSelect").value;

  let data = [...jeuxConstructeur];

  if(consoleVal !== "all")
    data = data.filter(j => j.console === consoleVal);

  if(selectedStatus !== "all")
    data = data.filter(j => j.statut === selectedStatus);

  if(search)
    data = data.filter(j => j.nom.toLowerCase().includes(search));

  render(data);
}

/* ---------------- RENDER ---------------- */
function render(data){

  if(selectedView === "table"){

    document.getElementById("table").style.display = "table";
    document.getElementById("kanban").style.display = "none";

    const table = document.getElementById("table");
    table.innerHTML = `
      <tr><th>Nom</th><th>Console</th><th>Statut</th></tr>
    `;

    data.forEach(j => {
      table.innerHTML += `
        <tr>
          <td>${j.nom}</td>
          <td>${j.console}</td>
          <td>${j.statut}</td>
        </tr>
      `;
    });

  } else {

    document.getElementById("table").style.display = "none";
    document.getElementById("kanban").style.display = "flex";

    document.getElementById("buy").innerHTML = "<h3>🛒 À acheter</h3>";
    document.getElementById("progress").innerHTML = "<h3>⏳ En cours</h3>";
    document.getElementById("collection").innerHTML = "<h3>🎮 Collection</h3>";

    data.forEach(j => {

      const div = document.createElement("div");
      div.className = "game";
      div.textContent = j.nom;

      if(j.statut === "A_acheter")
        document.getElementById("buy").appendChild(div);

      else if(j.statut === "Achat_en_cours")
        document.getElementById("progress").appendChild(div);

      else
        document.getElementById("collection").appendChild(div);
    });
  }
}

</script>

</body>
</html>
